---
layout: default
---
<article class="page-wrap">
  {% unless page.url == '/' %}
  <header class="page-header">
    <p class="eyebrow">{{ page.eyebrow | default: 'Portfolio' }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>
  {% endunless %}
  <div class="page-content">
    {{ content }}
  </div>
</article>
